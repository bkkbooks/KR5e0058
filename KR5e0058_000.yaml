front:
  text: 三訣同卷交九
  hash: sha256:3092b09233dbab4102f5c716d1477c09c0bf2431358684eac54c26a9c7341e89
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0058_HFL_000-001a, image: hfl/0796/0796-116.png}
body:
  text: 重陽真人金關玉鎖訣重陽真人授丹陽二十四訣馬自然金丹口訣終南山重陽子王喆譔重陽真人金關玉鎖訣或問曰如何是修真妙理答曰第一先除無名煩惱第二休貪戀酒色財氣此者便是修行之法夫人之一身皆具天地之理天地所以含養萬物萬物所以盈天地間其天地之高明廣大未嘗爲萬物所蔽修行之人凡應萬事亦當體之難曰天有昏暗地有動摇山有崩摧海有枯竭日月有盈缺且人有疾病無常如何治之答曰欲要治之除是達太上煉五行之法問曰如何是五行之法訣曰第一先須持戒清静忍辱慈悲實善斷除十惡行方便救度一切衆生忠君王孝敬父母師資此是修行之法然後習真功訣曰第一身中東西要識庚甲卯酉第二身中南北要識坎離鉛汞訣曰庚甲卯酉者爲晝夜甲卯者是肝之氣八節中立春春分口中爲津也庚酉者是肺之氣八節中立秋秋分口中爲液也坎離者寒暑離鉛者是身中心氣八節中立夏夏至身中爲血也坎汞者是腎中氣八節中立冬冬至身中爲精也精生魄血生魂精爲性血爲命人了達性命者便是真修行之法也訣曰精血者是肉身之根本真氣者是性命之根本故曰有血者能生真氣也真氣壯實者自然長久聚精血成形也問曰既爲人因甚生死先後者何也答曰先死者爲其人心著欲樂貪戀境界是男子者損精婦人損血白日不斷無名煩惱夜中不斬三屍陰鬼男子婦人已有無常也問曰不死之人何也答曰不死者爲其人身清静無垢借真炁在丹田精血不衰其人不死也難曰多見今人清靜休妻亦不能成道者何也答曰雖是此人清靜却不達真清靜之功其人雖是一身清静却不能定於精血養真氣此人身清心不清其身静意不静豈不聞清静經云夫道者有清有濁有動有静清者濁之源動者靜之基經云不垢不浄若論真清靜者眼内無淚鼻内無膿口内無唾不鍊大小便男子養精女子定血萬邪歸正萬病不生方可是丹田清靜今人說清静者都是假名夫修行若内外相應未言大乘先說小乘心經云能小能大未言過去先說見在過去者是果見在者是功又云功成果滿未言真是說假惟一靈是真肉身四大是假相借煉假成真感合爲一訣曰見在一身安樂爲小乘都是大乘之根初地法心爲小乘結果爲大乘小乘爲根大乘爲梢訣曰梢根相借梢借根而生今修行者不知身從何得性命縁何生訣曰皆不離陰陽所生須借父精母血二物者爲身之本也今人修行都不惜父精母血耗散真氣損却元陽故有老老有病病中有死既有無常何不治之夫真道者空中有實實中有空經云大道無形生育天地大道無名長養萬物從真性所生爲人者亦復如是昔日老君煉金木水火土留下三乘妙言行行滅罪句句長生第一上有神仙抱一第二中有富國安民第三下有强兵戰勝問曰何者是神仙抱一抱一者天下人身之根本一者是萬物之根本一者爲道也昔爲初一者真水也水中生氣氣中生水萬物者從一生萬物是長養一生二二生三三生萬物三中四智功五眼恁起六根掃蕩七魄運開八卦說九思真道憑無漏果圓融意想自神長在丹田抱守元炁莫教散失此者是抱一之法問曰何者是富國安民訣曰男子女人身中各有九江四海龍宫庫藏中有七珍八寶莫教六賊偷了此是富國安民問曰何者是强兵戰勝訣曰夫戰勝者天下少人知夫戰勝是常之法難曰既論清静之法何得說戰勝理解曰今人不達戰勝之法又能治於病疾無常戰勝者第一先戰退無名煩惱第二夜間境中要戰退三尸陰鬼第三戰退萬法此者是戰勝之法若人會得三乘者變殃惱爲福也夫修行者常清静爲根本大乘之法欲爲大乘者須索從小乘而起清不離濁動不離静静中便生動濁中便自有清有天地有日月有水火有陰陽謂之真道經云純陽而不生純陰而不長陰陽和合者能生萬物今人修道者却不修真道道者了達性命也性命者是精血也人有萬病是病者皆傷人之命矣有疾病者盡不干五臟之事都是損了精氣血三寶欲要安樂長生者除是持清静之識或有未出家之人年少時不能持清静之果從小乘入中乘上乘初地達法心爲小乘覺悟者爲中乘了達者爲上乘第一是化城第二是銀城第三是金城似一根大樹先有其根後有其梢如常時只宜清靜大爲正道也問曰假令一身清静却逢天魔之日如何治之又假令逢外道波巡請曰如何治之答曰波巡者界也境界皆有只要識進退三要辨清濁若逢陰陽者加火入水却濁不相煎之法訣曰假令魔軍來時急須準備檢三千强兵訣曰三千疏真功强兵者爲其氣也有來無去千息數積其氣在丹田不散只教暖不教冷自結胎仙爲妙法也若人得如上妙者永得如上真功功成果滿永得安樂長生一切修功之人臨有難之日小心準備問曰如何治之解曰人臨有難之日先見其死相問曰如何是死相訣曰天柱動摇樹倒山摧六神俱亂性命不能保精神恍惚天地闇日月無光便是無常之苗也有漏之身爲地獄無漏之果爲天堂人有漏之身須證無漏之果圓者皆共成於道果問曰假令白牛去時如何擒捉訣曰白牛去時緊叩玄關牢鎮四門急用仙人釣魚之法又用三島手印指黄河逆流掩上金關納合玉鎖如人斬眼白牛自然不走名機出水登彼岸之法有十般定性命之法訣曰一名金關玉鎖定二名三島回生换死定三名九曲黄河逆流定是名無漏果圓者皆共成於仙道若定了寶時休教滯了腰脚昏了眼目此是定三寶之法問曰若有人收定三寶搬運歸寄何處先用蘆芽穿膝之法烹氣衝寶爐骨運氣直至湧泉補於二足然後七返還丹之法如氣滯定腰脚時便行鐵車黑牛功然後開宰門如得元炁實肚者先行肘後飛金晶之法如不用行此功者不行穿膝之法不行七返三島之法便行肘後搬精補腦之法望長生不老今人行功顧上不顧下如小兒建塔下不堅牢也如何是中炁實要堅牢也又於坎宫便用羊鹿大牛三車搬從荆山運寶訣曰荆山却近有一人姓卞名和有一日荆山打柴却見一鳳凰落於一塊石上卞和便知石中有寶將來獻帝帝大怒刖了卞和雙足訣曰卞和者識也意頑石也鳳凰者是真氣成是身玉者是骨中精髓刖者是兩足不行穿膝之法訣曰善清靜名曰下元寶成如日月相似便用三車搬運上崑崙頂嘆曰今人能道不能造能說不能訣又曰行功心行意不行今人多迷不修身體第一神性是大牛之車須索動青牛拽車車中載寶是鹿車第二行白牛拽車車中載寶第三暖氣行火是羊車赤牛拽車車中載寶三車行時初離荆山尾閭中入地軸過天關過下雙關腎俞二穴是腰腿入曹溪地夾脊上雙關夾脊是也雙射上苑巖分水嶺二名天臺嶺三名女子運寶前安乳香頻進真火如行此功一年令婦人如童男意想鉛汞二珠射蓬萊腦後開天門自開透紅霞真炁入髓海自暖令人頭白再黑名曰肘後飛金晶之法我師言曰皆見提井人不見用繩兒無雖後生有神水還丹田夫行功之時子午起跏趺坐搓手如真氣煎體過天橋過額顱是也只教上腮下腮上用意分真氣兩下流轉太陽元中落於腮上流牙齒從左口角右口角取液又爲玄珠甘露用赤龍攪得匀停漱爲雪花白有甘味也口是八色瑠璃渠一中八味水二水中能生八識口含藏真氣真氣中分八卦艮爲立春震爲春分巽爲立夏離爲夏至坤爲立秋兌爲秋分乾爲立冬坎爲冬至八卦中各生陰陽陰陽中各分寒暑訣曰咽津爲陰隨後行氣乃爲陽須索陰陽水火停分二清津分三兩咽常留二停恐樹枯竭又云惜水流不得江河斷絶又問七返訣曰咽神水到氣顙中肺化爲液善治諸咳嗽漸生於魄又云咽津到心上令人心開悟解又是洗心神水洗心見性頌曰見花五葉開步步入仙臺神水化血又咽神水到肝肝爲木假名爲青龍龍得水時必旺善治一切眼氣化爲津又咽神水到脾脾爲土土得水者能生黄芽腹爲大小腸九曲至臍中一寸三分方圓一寸左青右白前赤後黑中黄戊己名爲丹田田内一座宫宫中名曰黄庭宫中有一罏名爲丹罏罏上坐定一隻金鼎下頻進真火上頻添神水水火者坎離也夫水火是君火臣火民火三火者爲真味也心性意是也今人未了達三般者第一味不明第二味不悟第三味智不成道矣若人達三般者三明六通也進火時上用水洗下用火煅經云身下出火身上出水其上合下閉乾坤相合教龍盤金鼎使虎遶丹田者爲妙名曰罏刀圭也若人行此功者永得安樂長生也問曰既刀圭何者言爲一粒刀圭何者自飲刀圭何者爲鐵離刀圭訣曰三刀圭者爲寶也是精氣血也訣曰一粒刀圭者津液自飲刀圭者咽津服炁鐵離刀圭者是真炁行功不退變萬邪皈正如行功時飢食金飯渴飲玉漿冷時進火熱時進水火者是真陽水者是真陰此功者是抽添加减之法訣曰抽者從上收真炁添者從下進暖炁入丹田若人腎宫暖者萬病消除問曰男子女人忽時便有疾病無常何如也答曰爲一切男子女人心著慾樂貪戀境界之事白日不斷無名煩惱夜間境中不能斷三尸陰鬼男子損却精女人損却血炁三寶走却元陽故乃人有疾病無常也不聞神仙之語人似破漏房屋主人不修補者宫殿倒塌壞其梁柱是人有疾病也難曰因甚小兒清静不損三寶亦有疾病無常者何也訣曰小兒有病者昔日在母腹中因母血氣虧弱受母十月胎氣不足又或犯風淫暑濕四集不忌受胎小兒故有疾病無常也問曰因甚有醜好之人何謂也訣曰貌正者是日父母二氣感應日月午時已前丑時已後便得端正真實長命有衣禄貌正得父母喜悅之心午時已後丑時已前受胎有一貌不正者或病聾喑瘂多性劣不得人意命窮無衣禄壽命不長也此是造化之根本也問曰假令逢冤魔者如何治之訣曰宜清静忙中偷閑閑中取静若人有難之時急須回避心王須用灌想之法急驅神意入上泥丸神宫正坐意想眼見前仙男仙女各動仙樂叩齒定意看崑崙山景見上牛羊鹿馬玉兔意想上拿住繫定功時忽思上有一寶樹樹上有花花開結子意摘取吞之是喫了此物者永得安樂長生此是修正法一句了然大牢鎮四門訣曰血海命門氣定無開閉户精定不思外境神定精血散者性命也一意者爲真主人也齒是爲玄關閉丹田者爲下玄關提金精上玄者爲金關緊叩齒者爲玉鎖六根不動者是六度號都關下納氣爲勒陽關上腮爲頂陽關鼻爲天門夾脊爲雙關行功之時一齊開鎖神不動者意不亂也意者恍惚也此是清靜之法也及春夏秋冬但小兒小便黄色者是丹田虚敗失却下元存真炁急用穿九曲之法又名九轉穿小腸九透真炁入腎堂小便自然青白色也一身便得安樂問曰何者是三乘之法訣曰下乘者如新生孩兒中乘者如小兒坐地上乘者如小兒行走若人通此三乘便超三界欲界色界無色界是心性意顯具三身清静法身圓滿報身三昧化身三者各有顯跡之神第一會太上煉甲乙木是虚坦會老君著青衣度三千青衣道士者轉青神黄卷三十六部靈寶尊經留下九轉丹黄芽穿膝之法絶國第二會釋迦佛留下煉南方丙丁火身被烈火袈裟三千赤子比丘僧人留下十二部大乘尊經射九重鐵鼓之法蘆芽穿膝之法龍華三會夫子在魯國之習學堂煉西方庚辛金三千白衣居士留下十卷論語并穿九曲明珠蘆芽穿膝之法三教者如鼎三足身同歸一無二無三三教者不離真道也喻曰似一根樹生三枝也問曰大道之中離幾等神仙解曰聞傳道集中有五等神仙第一不持戒不斷酒肉不殺生不思善爲鬼仙之類第二養真氣長命者爲地仙第三好戰争是劍仙第四打坐修行者爲神仙第五孝養師長父母六度萬行方便救一切衆生斷除十惡不殺生不食酒肉邪非偷盜出意同天心正直無私曲名曰天仙當日初發善心處便是吉祥之地爲善法大修行人後有禁忌之文訣曰男女五月六月宜清静大忌十一月十二月宜清静又男子五月六月大殺之月勿近婦人爲五勞七傷男損性命女人損性者是精血氣也損者令人左癱右痪赤白帶下若損五行真氣爲勞損七寶爲傷萬病者各有來處問曰病從何生訣曰萬病皆從八節不正之氣而生問曰何者八邪訣曰八卦中陰陽不順是八節中氣令人入邪者是飢飽勞役風寒暑濕飢來痛飽寒極憂心遠行困倦及冷熱身醉亦不可行功變成大病也宜清静行之行時舌上收玉液丹鼻中收元陽丹腎堂中收金液丹如精髓滿骨實者死經百年筋骨不解名爲連子環鎮骨訣曰二十四忌大丹者是一年二十四炁上令告我師願求妙訣須索意自息肯捨重金浄財第一捨身布施第二將花獻師第三令膳而供養解曰捨身布施者若見師長父母危時捨命求命將花獻師者若師長須打駡須將喜笑迎之面上無嗔恕令饍而供養者食有好味先奉其師此名三布施也仙人言曰堅者爲道歡喜者爲緣若求師不勤豈至於道吕翁曰不因師指此事難知又云學而不知者不學而悟之學而不從師名爲盜學也是法中賊若掩祖上師得促自己壽與常人同例自揚己得是斷行做作此人可以成道乎其人謂輕師慢法不堪爲師未學修行先持救濟他人者爲救自己者憑功德行人各認祖宗科牌太上爲祖釋迦爲宗夫子爲科牌自從三教既寂已後一切男女在愛河内煎煮苦海漂沉受其煩惱六道沉淪不生不落去住三教聖主三界聖母却來救度兒女名號記顯現分明壽印信爲其勘同解曰一身爲全受戒者爲記心悟了達者爲火隨求經云如意寶印從心顯名爲號有十號者爲十善十號者爲能人一號元修二號轉分明三號通三界四號長生五號光明現六號意通七號全身主八號福禄增九號天元修十號者爲能人一加性十號無漏功德自然成三教者是隨意演化衆生皆不離於道也古人言曰世間性命事大修行者生老病死苦今人各不曉真道往往著空盡落空現在亦不能了何言過去之事又聞達磨經云過去非言實未來不爲真太上煉九轉還丹令人去病疾了生死夫子教仁義禮智信恐人招業在身令人修此亦能治其疾病問曰如何治於病疾訣曰除眼大良藥解曰長大歡爲良藥訣曰歡喜者是藥之根本常煩惱者是萬病之根本或常清静者是大道之苖但見今人修行或僧道五戒男子婦人却因甚病疾無常或男子女人有夫無婦者丹田走却靈龜耗散真炁下元虚冷漸生萬病男子清静六十四日精炁滿女子清静四十九日血炁滿物極者則返清爲濁返静爲動返心意散失九竅走却真氣炁濁令女子月水多男子夜夢陰境盜了七珍八寶故人有疾病也問曰陰鬼如何治之答曰用刀圭之法曰何者爲刀圭訣曰刀圭者一也有水有氣能生萬物也炁爲圭爲雲水爲雨又曰出炁爲刀入炁爲圭行功爲萬有驗者爲刀圭是返老還童也經云身下出火身上出水水火爲藥訣曰蘆芽穿膝上下河車安罏竈是紫河車搬精補腦之上車進火時水暖進水時火凉水火雙行者是温温鉛鼎鼎中入氣起休交上隨車火時散入百脉皮膚滋潤身體光澤此是修養之法難曰因何人肥者先衰訣曰肥人者修外不修裏骨中無髓丹田走却真炁故衰病也修内道者安樂長生之苗訣曰長教龍盤金鼎虎遶丹田震卦起雷巽卦起風行功時漱津一大口分三度咽按氣下行三徧自然有龍吟虎嘯之聲亦能除腹中萬病耳聽之如雷搥畫鼓上者爲昇下者爲降頌曰真空妙理無人知曲江端坐看烏飛震地雷聲驚鬼魅正是陰陽造化時子後午前加减用水火烹煎龍虎隨金公帶酒黄婆醉拽定王公問是誰問曰金公是神黄婆是炁陽炁是嬰兒陰炁是姹女青龍者是肝之炁也白虎者是肺之炁也坎離者是精血訣曰行功時坐如泰山立如寶塔牢鎮四門緊叩玄關漱津一口爲猛三咽下接炁過離隔活作三度自然龍虎之炁復如行住坐卧禁口閉目耳不聽聲眼視内景一日正觀丹田意中想見隨呼炁下降隨吸炁上昇不過離隔不教注面目上六炁各到中元相見清炁右行濁氣左行各轉九遭炁上下不能出左右結成罏竈號龍盤虎遶氣自然和會又嬰兒姹女爲夫婦之法炁聚於脾上安罏號黄婆匹配之法又名天地交泰之法又名坎離交媾是體交神不交之法神不交者是清静之法千徧不摇不動之法今人者多修外道不修内道見在道過去法夫修行者外有條大道教内有正路無人知處大衆前行三里見三條大澗亦無底怎生過去訣曰三條大澗者是三教三乘起三屍定三寶超三界向前又行三里見六條深溝不能前進是何門訣曰是六度萬行六根清静斬六賊戒六欲樹六梯向前又行三里見三産枋是寶浄枋七林屍多便是臨作用行三里又見一座園名爲舍果園一翁看定園門有緣者空手得過向前園又行三里見一根大樹上繫定金牛河邊上有座臺男子黄金臺女子鳳凰臺神仙釣魚臺安樂千花臺若無常望鄉臺河口有三箇女子渡口便是魔女衆滿舟船過此河又行三里見一座大山名是須彌山山東坡有一隻青羊是老君之炁西坡見一隻白羊是夫子之炁正南見一隻黄羊是大覺金仙之炁三箇羊兒引接大衆入山名三陽聚鼎山山中有一座城名爲北城有四門門上有牌牌上有字東是開光門西是長生門南是金光門北是大淪門此是眼耳鼻口入得四門見四洞府天樂洞白雲洞竹國洞長生洞入得四洞見四寺無浄寺玄空寺竹林寺入四寺有四果安禪羅漢斯陀含須陀洹阿那含阿羅漢爲四寺主此是四果仙人也向前又見五觀第一功名觀第二醫藥觀第三安陽觀第四真如觀第五兜率觀五觀中有五宫雙女宫是眼大龍宫是口上白宫是鼻水晶宫是耳天秤宫是心内坐大樓閣上下十二呼吸名曰十二重樓也有中宫樓月宫樓天仙樓取寶樓聖井樓法炁妙音樓識道樓禪頂樓景陽樓鍾鼓樓二聖樓每年十二月一日十二時人身中有十二月樓樓者按經十二經十二支干四面又見九宫是人有九竅也夫九竅宫者東有風雷宫雙林宫南有紫微宫牟尼宫西有聖母宫惠羅宫北有梵宫水晶宫中央號安宫此名爲九宫猶地列九州也又微府元共計十州也是十國焦祖國牟尼國開花國鹿嚴國金色國琉璃國舍衛國南禪國天竺國重陽國十國者便是十地每一地中一坐泰山身是甚物是治種大病皆傷人命身有四大海津爲東海血爲南海髓爲西海氣爲北海更有九洲小腸是也更有五湖身是洞庭湖精是玉湖甘露是醍醐心爲玄湖小腸爲江湖日月星辰三消血氣精衰也三消是山崩海竭地裂一日十二時辰中得坐莫越其人功成果滿男子鍊形如童男女子鍊形如童女經云形神俱妙與道合真此是抽胎换骨之法陰陽顛倒五行真訣五行含金木水火土春木旺内木不旺人多病眼疾夏火旺内火不旺人多瀉痢秋金旺内金不旺人多咳嗽冬水旺内水不旺人多疝氣脾爲土四季分了脾氣陰陽顛倒返復也五行各有相尅金尅木木尅土土尅水水尅火火尅金水火者是陰陽也一陰一陽真道也精血也人有萬病盡不干五臟之事都是損了父母精血丹田弱便生病疾也急收神定性九仙經云道者一也人得一者萬事必成行功時神氣轉炁逐意行運時前趕前衝爲陰左將陰神六甲驅轉六相八識匡一真靈内遊九宫看翫十國長生降臺使嬰兒姹女丹田安爐竈進火燒藥意想見爐紅竈熱丹藥方成意想青龍在左白虎在右朱雀在前玄武在後四坐大神各手執長鎗闊劍看定藥爐自服妙藥若人累行此功永得長生令邪氣自散真氣自生口若飲荆山玉泉口中自然香甜也二下穴通達腎堂隨呼氣取之寶氣入口嗽三十六遍爲雪花咽入丹田爲雪也隨後便上合下閉乾坤相合真氣滿足脾暖者萬病消除似竈中燒瓦時到自然成如雞抱卵婦人懷胎不計時候但覺身中疼痛者便是鐵黑牛搬車也是真一氣真一性黑者是下氣也痛氣大便出腫氣小便出又有降天關地軸法望項陽關泥丸宫鼻中長引真氣入口大呵作六遍天關地軸如死不動每日行宫者常調和陰陽冬至日一陽生夏至日一陰生冬至者是子時已後望東方日出爲陽夏至者午時已後日没是陰也陰陽返復之理也地氣上騰天雨下降三日一風十朝二雨風雨順時人民便快樂便是一身快樂無病長久也人有萬病者每一病各一般真功治其病自應也第一大煉九轉還丹之法有黄芽穿膝之法射九重鐵鼓之法太子遊四門之法有金鞭指輪之法有蘆芽穿膝之法有軒轅跨火之法有玉女摸身之法有鍾離背劍之法有吕翁釣魚之法有陳希夷大睡之法三教内行法門者盡各治於疾病也更有能超生者人行轉此功丹田養熱真氣夜間多夢見山上放牛其牛者是赤牛或青牛或仙人道士宫觀寺院大道好房高車好樹夜見小兒女并大官人者並是丹田氣壯若夢見小道荒棘惡人趁破房屋塔墓樹倒河渡恐怕並是丹田氣衰弱宜用補之訣曰封三人休言說六耳恐漏神仙之機訣曰此三人者第一對夫不孝之人第二對夫不敬信之人第三對夫不傳戒不善之人莫說此訣除此等人外不分男子女人僧道官人皆得傳法受戒此修真成訣者價直須彌金取諸經爲祖對安樂者是小乘之法雖是小乘却是大乘根本因果經中俱言修行有八般福田救苦看病福田者是第一救生性强如南寺燒香北院送供救一人之命如造七級寶塔若男子女人收得此訣勿可亂傳如有亂傳者輕泄仙人妙機九祖盡墮於沉淪永鎮酆都不得人身慎之戒之信受奉行重陽真人金關玉鎖訣
